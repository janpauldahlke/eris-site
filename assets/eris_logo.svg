<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 600" width="100%" height="100%">
  <defs>
    <!-- Rich metallic copper gradient -->
    <linearGradient id="copper-gradient" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#784225" />
      <stop offset="30%" stop-color="#b87b5c" />
      <stop offset="70%" stop-color="#dea584" />
      <stop offset="100%" stop-color="#8f5335" />
    </linearGradient>

    <!-- Deep shadow for 3D depth on dark backgrounds -->
    <filter id="subtle-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="10" flood-color="#000000" flood-opacity="0.6"/>
    </filter>
  </defs>

  <!-- Deep charcoal/black workspace background -->
  <rect width="100%" height="100%" fill="#111115" />

  <g filter="url(#subtle-shadow)">
    <!-- ================= THE EYE (DIAMOND/GEOMETRIC) ================= -->
    <!-- Replaced smooth curves with sharp, technical diamond-facets -->
    <g stroke="url(#copper-gradient)" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" fill="none">
      <!-- Outer Hex/Diamond Eye -->
      <polygon points="230,115 270,90 310,115 270,140" />
      <polygon points="245,115 270,100 295,115 270,130" stroke-width="2" />
      <!-- Square Pupil rotated 45 degrees -->
      <rect x="264" y="109" width="12" height="12" transform="rotate(45 270 115)" fill="url(#copper-gradient)" stroke="none" />
    </g>

    <!-- ================= STEPS & PROMPT ARROW ================= -->
    <!-- 45-degree angled terminal arrow sweeping up from center -->
    <g stroke="url(#copper-gradient)" stroke-width="14" stroke-linecap="square" stroke-linejoin="miter" fill="none">
      <path d="M 275,185 L 295,185 L 315,165 L 315,115 L 345,85 L 345,60" />
      <!-- Arrowhead -->
      <path d="M 315,60 L 345,60 L 345,90" />
    </g>

    <!-- ================= MAIN LEFT BRACKET (SHARP) ================= -->
    <g stroke="url(#copper-gradient)" stroke-width="14" stroke-linecap="square" stroke-linejoin="miter" fill="none">
      <path d="
        M 270,390 
        L 210,390 
        L 210,300 
        L 190,280 
        L 165,280 
        L 165,250 
        L 190,250 
        L 210,230 
        L 210,160 
        L 255,160
      " />
    </g>

    <!-- ================= MAIN RIGHT BRACKET (SHARP) ================= -->
    <g stroke="url(#copper-gradient)" stroke-width="14" stroke-linecap="square" stroke-linejoin="miter" fill="none">
      <path d="
        M 330,390 
        L 390,390 
        L 390,300 
        L 410,280 
        L 435,280 
        L 435,250 
        L 410,250 
        L 390,230 
        L 390,160 
        L 345,160
      " />
    </g>

    <!-- ================= OUTER CIRCUIT DETAILS ================= -->
    <!-- Adds a highly detailed secondary track hugging the outer brackets -->
    <g stroke="url(#copper-gradient)" stroke-width="4" stroke-linecap="square" stroke-linejoin="miter" fill="none" opacity="0.85">
      <!-- Left Outer Parallel Track -->
      <path d="M 270,415 L 190,415 L 190,310 L 170,290 L 145,290 L 145,240 L 170,240 L 190,220 L 190,140 L 240,140" />
      <!-- Left Track Terminal Node -->
      <rect x="240" y="137" width="6" height="6" fill="url(#copper-gradient)" stroke="none" />
      <rect x="270" y="412" width="6" height="6" fill="url(#copper-gradient)" stroke="none" />

      <!-- Right Outer Parallel Track -->
      <path d="M 330,415 L 410,415 L 410,310 L 430,290 L 455,290 L 455,240 L 430,240 L 410,220 L 410,140 L 360,140" />
      <!-- Right Track Terminal Node -->
      <rect x="354" y="137" width="6" height="6" fill="url(#copper-gradient)" stroke="none" />
      <rect x="324" y="412" width="6" height="6" fill="url(#copper-gradient)" stroke="none" />
    </g>

    <!-- ================= CORE SCHEMATIC DETAIL ================= -->
    <!-- Abstract geometric circuit elements to fill the void of the removed text -->
    <g stroke="url(#copper-gradient)" stroke-width="4" stroke-linecap="square" stroke-linejoin="miter" fill="none" opacity="0.75">
      <!-- Center Boundary Grid -->
      <rect x="245" y="210" width="110" height="130" stroke-dasharray="10 10" />
      
      <!-- Logic Paths inside the core -->
      <path d="M 265,240 L 335,240" />
      <path d="M 265,275 L 305,275 M 315,275 L 335,275" />
      <path d="M 265,310 L 335,310" />
      
      <!-- Square micro-nodes -->
      <rect x="295" y="237" width="8" height="6" fill="url(#copper-gradient)" stroke="none" />
      <rect x="275" y="307" width="8" height="6" fill="url(#copper-gradient)" stroke="none" />
    </g>

    <!-- ================= BASE JOINING STRUT ================= -->
    <!-- Solid locking bar at the base of the design -->
    <path d="M 295,390 L 305,390" stroke="url(#copper-gradient)" stroke-width="14" stroke-linecap="square" />

  </g>
</svg>
